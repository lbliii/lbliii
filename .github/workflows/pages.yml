name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.14t"

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Install dependencies
        run: uv sync
        env:
          PYTHON_GIL: "0"

      - name: Get cache hash
        id: cache
        working-directory: blog
        run: echo "hash=$(uv run bengal cache hash)" >> $GITHUB_OUTPUT
        env:
          PYTHON_GIL: "0"

      - name: Cache Bengal build state
        uses: actions/cache@v4
        with:
          path: blog/.bengal
          key: bengal-${{ runner.os }}-${{ steps.cache.outputs.hash }}

      - name: Build blog
        working-directory: blog
        run: uv run bengal site build --environment production --clean-output
        env:
          PYTHON_GIL: "0"

      - name: Prepare for upload
        run: |
          touch blog/public/.nojekyll
          echo "" > blog/public/.gitignore

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: blog/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
